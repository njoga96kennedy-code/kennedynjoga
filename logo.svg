<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" role="img" aria-label="Cinema Nest">
  <title>Cinema Nest</title>

  <!-- nest arcs -->
  <path d="M 10 22 Q 20 8 30 22"  fill="none" stroke="#e50914" stroke-width="3"   stroke-linecap="round"/>
  <path d="M 13 25 Q 20 14 27 25" fill="none" stroke="#e50914" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <path d="M 16 27 Q 20 19 24 27" fill="none" stroke="#e50914" stroke-width="2"   stroke-linecap="round" opacity="0.35"/>

  <!-- play triangle -->
