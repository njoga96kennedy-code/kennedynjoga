  <!-- egg dots -->
  <circle cx="17" cy="33" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="20" cy="35" r="2.5" fill="#ffffff" opacity="0.75"/>
  <circle cx="23" cy="33" r="2.5" fill="#ffffff" opacity="0.5"/>

  <!-- wordmark -->
  <text x="36" y="27" font-family="'Bebas Neue', sans-serif" font-size="26" fill="#ffffff" letter-spacing="2">CINEMA NEST</text>
</svg>
