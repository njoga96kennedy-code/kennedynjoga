<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cineby Clone</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { background:#141414; color:white; }
.scroll::-webkit-scrollbar { display:none; }
</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between items-center p-4 bg-black sticky top-0 z-50">
  <h1 class="text-red-600 text-xl font-bold">Cineby</h1>
  <button onclick="login()" class="bg-red-600 px-4 py-1 rounded">Login</button>
</div>

<!-- HERO -->
<div id="hero" class="h-[60vh] bg-cover flex items-end p-6">
  <div>
    <h1 id="hero-title" class="text-3xl font-bold"></h1>
    <button onclick="playStream(currentStream)" class="bg-white text-black px-4 py-2 mt-3">
      ▶ Play
    </button>
  </div>
</div>

<!-- CONTINUE -->
<div class="p-4">
  <h2 class="text-xl mb-2">Continue Watching</h2>
  <div id="continue" class="flex space-x-4 overflow-x-scroll scroll"></div>
</div>

<!-- MOVIES -->
<div class="p-4">
  <h2 class="text-xl mb-2">Movies</h2>
  <div id="movies" class="flex space-x-4 overflow-x-scroll scroll"></div>
</div>

<!-- SERIES -->
<div class="p-4">
  <h2 class="text-xl mb-2">Series</h2>
  <div id="series" class="flex space-x-4 overflow-x-scroll scroll"></div>
</div>

<!-- SERIES MODAL -->
<div id="seriesModal" class="fixed inset-0 bg-black hidden p-6 overflow-y-auto">
  <button onclick="closeSeries()" class="bg-red-600 px-3 py-1 mb-4">Close</button>
  <div id="episodes"></div>
</div>

<!-- PLAYER -->
<div id="modal" class="fixed inset-0 bg-black hidden items-center justify-center">
  <div class="w-[90%] md:w-[70%]">
    <video id="video" controls class="w-full"></video>
    <button onclick="closePlayer()" class="mt-2 bg-red-600 px-3 py-1">Close</button>
  </div>
</div>

<script>
const API = "http://localhost:5000/api"; // CHANGE AFTER DEPLOY
let token = localStorage.getItem("token") || "";

let currentStream = "";
let currentMovieId = "";
let interval;

// INIT
init();

async function init() {
  await loadMovies();
  await loadSeries();
  loadContinue();
}

// LOGIN
async function login() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);

  alert("Logged in!");
}

// MOVIES
async function loadMovies() {
  const res = await fetch(API + "/movies");
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${m.poster}" class="w-[150px] rounded cursor-pointer">
      <p>${m.title}</p>
    `;

    div.onclick = () => {
      currentMovieId = m.id;
      currentStream = API + "/stream/" + m.id;
      playStream(currentStream);
    };

    container.appendChild(div);
  });

  // HERO
  const first = data[0];
  if (first) {
    document.getElementById("hero").style.backgroundImage = `url(${first.backdrop})`;
    document.getElementById("hero-title").innerText = first.title;
  }
}

// SERIES
async function loadSeries() {
  const res = await fetch(API + "/series");
  const data = await res.json();

  const container = document.getElementById("series");
  container.innerHTML = "";

  data.forEach(show => {
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${show.poster}" class="w-[150px] rounded cursor-pointer">
      <p>${show.title}</p>
    `;

    div.onclick = () => openSeries(show);

    container.appendChild(div);
  });
}

// OPEN SERIES
function openSeries(show) {
  const modal = document.getElementById("seriesModal");
  const container = document.getElementById("episodes");

  modal.classList.remove("hidden");
  container.innerHTML = "";

  show.seasons.forEach(season => {
    const sDiv = document.createElement("div");

    sDiv.innerHTML = `<h2 class="text-xl mt-4">Season ${season.season}</h2>`;

    season.episodes.forEach(ep => {
      const eDiv = document.createElement("div");

      eDiv.innerHTML = `
        <p>${ep.episode}. ${ep.title}</p>
        <button class="bg-red-600 px-2 py-1 mt-1">▶ Play</button>
      `;

      eDiv.onclick = () => {
        currentMovieId = show.id + "_" + ep.episode;
        currentStream = ep.stream;
        playStream(currentStream);
      };

      sDiv.appendChild(eDiv);
    });

    container.appendChild(sDiv);
  });
}

function closeSeries() {
  document.getElementById("seriesModal").classList.add("hidden");
}

// PLAYER
function playStream(url) {
  if (!token) return alert("Login first");

  const video = document.getElementById("video");
  document.getElementById("modal").classList.remove("hidden");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  video.play();

  const saved = JSON.parse(localStorage.getItem("progress")) || {};
  if (saved[currentMovieId]) {
    video.currentTime = saved[currentMovieId].time;
  }

  clearInterval(interval);
  interval = setInterval(() => saveProgress(video), 5000);
}

function closePlayer() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("video").src = "";
  clearInterval(interval);
}

// PROGRESS
function saveProgress(video) {
  if (!video.duration) return;

  const progress = JSON.parse(localStorage.getItem("progress")) || {};

  progress[currentMovieId] = {
    time: video.currentTime,
    duration: video.duration,
    updated: Date.now()
  };

  localStorage.setItem("progress", JSON.stringify(progress));
  loadContinue();
}

// CONTINUE WATCHING
function loadContinue() {
  const container = document.getElementById("continue");
  container.innerHTML = "";

  const progress = JSON.parse(localStorage.getItem("progress")) || {};

  Object.keys(progress)
    .sort((a,b) => progress[b].updated - progress[a].updated)
    .forEach(id => {
      const item = progress[id];

      const div = document.createElement("div");

      div.innerHTML = `
        <div class="w-[150px]">
          <div class="bg-gray-700 h-1">
            <div class="bg-red-600 h-1" style="width:${(item.time/item.duration)*100}%"></div>
          </div>
          <button class="bg-red-600 mt-2 px-2 py-1 text-xs">Resume</button>
        </div>
      `;

      div.onclick = () => playStream(currentStream);

      container.appendChild(div);
    });
}
</script>

</body>
</html>
