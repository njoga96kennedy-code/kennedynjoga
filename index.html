<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFlix</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
}

.logo {
  color: red;
  font-size: 24px;
  font-weight: bold;
}

#search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.row {
  margin: 20px;
}

.row h2 {
  margin-left: 10px;
}

.row-posters {
  display: flex;
  overflow-x: auto;
}

.poster {
  width: 150px;
  margin: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.poster:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal-content {
  width: 90%;
  max-width: 900px;
}

iframe {
  width: 100%;
  height: 500px;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* Episode selector */
.episodes {
  margin-top: 10px;
}

button {
  margin: 5px;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">MYFLIX</div>
  <input type="text" id="search" placeholder="Search...">
</header>

<div class="row">
  <h2>Trending</h2>
  <div class="row-posters" id="trending"></div>
</div>

<div class="row">
  <h2>TV Series</h2>
  <div class="row-posters" id="tv"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <div class="modal-content">
    <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
    <div class="episodes" id="episodes"></div>
  </div>
</div>

<script>
const API_KEY = "nx_ae62cfca602d97dc532d2f2282d4575a";
const BASE_URL = "https://api.codespecters.com";

async function fetchMovies(endpoint, container) {
  const res = await fetch(`${BASE_URL}${endpoint}&api_key=${API_KEY}`);
  const data = await res.json();

  container.innerHTML = "";

  data.results.forEach(item => {
    const img = document.createElement("img");
    img.src = item.poster;
    img.classList.add("poster");

    img.onclick = () => openPlayer(item);

    container.appendChild(img);
  });
}

function openPlayer(item) {
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");
  const episodesDiv = document.getElementById("episodes");

  modal.style.display = "flex";

  // Movie
  if (!item.seasons) {
    player.src = `${BASE_URL}/embed/movie/${item.id}?api_key=${API_KEY}`;
    episodesDiv.innerHTML = "";
  } 
  // TV Series
  else {
    loadEpisodes(item.id, 1);
  }
}

function loadEpisodes(id, season) {
  const player = document.getElementById("player");
  const episodesDiv = document.getElementById("episodes");

  episodesDiv.innerHTML = "";

  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.innerText = "Ep " + i;

    btn.onclick = () => {
      player.src = `${BASE_URL}/embed/tv/${id}/${season}/${i}?api_key=${API_KEY}`;
    };

    episodesDiv.appendChild(btn);
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("player").src = "";
}

document.getElementById("search").addEventListener("input", async (e) => {
  const query = e.target.value;

  if (!query) return;

  const res = await fetch(`${BASE_URL}/search?q=${query}&api_key=${API_KEY}`);
  const data = await res.json();

  const trending = document.getElementById("trending");
  trending.innerHTML = "";

  data.results.forEach(item => {
    const img = document.createElement("img");
    img.src = item.poster;
    img.classList.add("poster");

    img.onclick = () => openPlayer(item);

    trending.appendChild(img);
  });
});

// LOAD DATA
fetchMovies("/movies/trending?", document.getElementById("trending"));
fetchMovies("/tv/popular?", document.getElementById("tv"));
</script>

</body>
</html>
