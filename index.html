<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MovieFlix</title>

<style>
body {
  margin: 0;
  background: #141414;
  color: white;
  font-family: Arial;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 10px 15px;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

.logo {
  color: red;
  font-size: 22px;
}

.controls {
  display: flex;
  gap: 5px;
}

select, input {
  padding: 5px;
  font-size: 12px;
  background: black;
  color: white;
  border: 1px solid gray;
}

/* HERO */
.hero {
  height: 60vh;
  background-size: cover;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.hero h1 {
  font-size: 30px;
}

/* ROW */
.row {
  padding-left: 10px;
  margin-top: 10px;
}

.row h2 {
  font-size: 16px;
}

/* SCROLL */
.row-wrapper {
  position: relative;
}

.row-posters {
  display: flex;
  overflow-x: auto;
}

.poster-container {
  position: relative;
  margin-right: 8px;
}

.poster {
  width: 120px;
}

/* MOBILE FIX */
@media (min-width: 768px) {
  .poster {
    width: 200px;
  }
}

/* HOVER */
.hover-info {
  display: none;
}

.poster-container:hover .hover-info {
  display: block;
  position: absolute;
  bottom: 0;
  background: black;
  width: 100%;
}

/* MODAL */
#modal {
  position: fixed;
  width:100%;
  height:100%;
  background: black;
  display:none;
  flex-direction: column;
}

#player {
  width: 100%;
  height: 60%;
  border: none;
}

/* EPISODE PANEL */
#episodePanel {
  padding: 10px;
  background: #111;
}

#episodePanel select {
  width: 100%;
  margin-bottom: 5px;
}

button {
  padding: 8px;
  border: none;
  background: red;
  color: white;
}
</style>
</head>

<body>

<header>
  <div class="logo">MovieFlix</div>
  <div class="controls">
    <select id="type">
      <option value="movie">Movies</option>
      <option value="tv">Series</option>
    </select>
    <input id="search" placeholder="Search">
  </div>
</header>

<div class="hero" id="hero"></div>
<div id="rows"></div>

<!-- PLAYER -->
<div id="modal">
  <iframe id="player"></iframe>

  <!-- EPISODE SELECTOR -->
  <div id="episodePanel" style="display:none;">
    <select id="season"></select>
    <select id="episode"></select>
    <button onclick="loadEpisode()">Play Episode</button>
  </div>
</div>

<script>
const API_KEY = "1d3ae144acfb6bfcb25f70361cedcf29";
const BASE = "https://api.themoviedb.org/3";
const STREAM_KEY = "nx_a6c5083f70bde5a7b4c2dec92de375ac";

let type = "movie";
let currentId = null;

/* TYPE SWITCH */
document.getElementById("type").addEventListener("change", (e)=>{
  type = e.target.value;
  loadAll();
});

/* HERO */
async function loadHero() {
  const res = await fetch(`${BASE}/trending/${type}/day?api_key=${API_KEY}`);
  const data = await res.json();
  const m = data.results[0];

  document.getElementById("hero").style.backgroundImage =
    `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

  document.getElementById("hero").innerHTML = `<h1>${m.title || m.name}</h1>`;
}

/* ROW */
async function createRow(title, url) {
  const res = await fetch(url);
  const data = await res.json();

  return `
    <div class="row">
      <h2>${title}</h2>
      <div class="row-posters">
        ${data.results.slice(0,10).map(m=>`
          <div class="poster-container" onclick="openPlayer(${m.id})">
            <img class="poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

/* LOAD ROWS */
async function loadRows() {
  const rows = document.getElementById("rows");

  const trending = await createRow("Trending", `${BASE}/trending/${type}/day?api_key=${API_KEY}`);
  const topRated = await createRow("Top Rated", `${BASE}/${type}/top_rated?api_key=${API_KEY}`);
  const comedy = await createRow("Comedy", `${BASE}/discover/${type}?api_key=${API_KEY}&with_genres=35`);

  rows.innerHTML = trending + topRated + comedy;
}

/* OPEN PLAYER */
async function openPlayer(id) {
  currentId = id;
  document.getElementById("modal").style.display = "flex";

  if(type === "movie") {
    document.getElementById("episodePanel").style.display = "none";
    document.getElementById("player").src =
      `https://api.codespecters.com/embed/movie/${id}?apikey=${STREAM_KEY}`;
  } else {
    document.getElementById("episodePanel").style.display = "block";
    loadSeasons(id);
  }
}

/* LOAD SEASONS */
async function loadSeasons(id) {
  const res = await fetch(`${BASE}/tv/${id}?api_key=${API_KEY}`);
  const data = await res.json();

  const seasonSelect = document.getElementById("season");

  seasonSelect.innerHTML = data.seasons.map(s =>
    `<option value="${s.season_number}">Season ${s.season_number}</option>`
  ).join("");

  loadEpisodes();
}

/* LOAD EPISODES */
async function loadEpisodes() {
  const season = document.getElementById("season").value;

  const res = await fetch(`${BASE}/tv/${currentId}/season/${season}?api_key=${API_KEY}`);
  const data = await res.json();

  const episodeSelect = document.getElementById("episode");

  episodeSelect.innerHTML = data.episodes.map(e =>
    `<option value="${e.episode_number}">Episode ${e.episode_number}</option>`
  ).join("");
}

/* PLAY EPISODE */
function loadEpisode() {
  const season = document.getElementById("season").value;
  const episode = document.getElementById("episode").value;

  document.getElementById("player").src =
    `https://api.codespecters.com/embed/tv/${currentId}/${season}/${episode}?apikey=${STREAM_KEY}`;
}

/* CHANGE SEASON */
document.getElementById("season").addEventListener("change", loadEpisodes);

/* SEARCH */
document.getElementById("search").addEventListener("input", async e=>{
  const q = e.target.value;
  if (!q) return loadRows();

  const res = await fetch(`${BASE}/search/${type}?api_key=${API_KEY}&query=${q}`);
  const data = await res.json();

  document.getElementById("rows").innerHTML = `
    <div class="row">
      <h2>Results</h2>
      <div class="row-posters">
        ${data.results.map(m=>`
          <div class="poster-container" onclick="openPlayer(${m.id})">
            <img class="poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">
          </div>
        `).join("")}
      </div>
    </div>
  `;
});

/* INIT */
async function loadAll() {
  await loadHero();
  await loadRows();
}

loadAll();
</script>

</body>
</html>
