<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Nest</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e50914;
  --red-dark:#b0060f;
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1e1e1e;
  --text:#fff;
  --muted:#aaa;
  --radius:6px;
  /* Dynamic global horizontal spacing for smooth scaling */
  --pad: clamp(20px, 4vw, 48px);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* ─── NAV ─── */
.nav{
  position:fixed;top:0;width:100%;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px var(--pad);
  transition:background .4s,backdrop-filter .4s;
}
.nav.scrolled{background:rgba(10,10,10,.95);backdrop-filter:blur(12px);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);letter-spacing:2px;cursor:pointer;}
.nav-right{display:flex;align-items:center;gap:20px;}

.search-wrap{position:relative;display:flex;align-items:center;}
.search-wrap svg{position:absolute;left:12px;width:16px;height:16px;stroke:var(--muted);pointer-events:none;}
#search{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  padding:9px 14px 9px 36px;border-radius:24px;color:var(--text);
  width:200px;font-size:14px;font-family:inherit;
  transition:width .3s,background .2s,border-color .2s;outline:none;
}
#search:focus{width:280px;background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.25);}
#search::placeholder{color:var(--muted);}

.my-list-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:8px 16px;border-radius:24px;cursor:pointer;
  font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px;
  transition:background .2s;
}
.my-list-btn:hover{background:rgba(255,255,255,.15);}

.subscribe-btn{
  background:var(--red);border:none;
  color:#fff;padding:8px 18px;border-radius:24px;cursor:pointer;
  font-size:13px;font-family:inherit;font-weight:600;letter-spacing:.3px;
  transition:background .2s,transform .15s;
}
.subscribe-btn:hover{background:var(--red-dark);transform:scale(1.04);}

.btn-trial{
  background:rgba(229,9,20,.15);color:var(--red);
  border:1.5px solid rgba(229,9,20,.5);padding:12px 24px;border-radius:4px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:8px;
  transition:background .2s,border-color .2s;
}
.btn-trial:hover{background:rgba(229,9,20,.25);border-color:var(--red);}

/* ─── SEARCH RESULTS OVERLAY ─── */
#search-results{
  position:fixed;top:60px;left:0;right:0;bottom:0;
  background:rgba(10,10,10,.97);z-index:999;
  display:none;overflow-y:auto;padding:40px var(--pad);
}
#search-results.active{display:block;}
#search-results h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:24px;color:var(--muted);}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}

/* ─── HERO (FIXED MOBILE CLIPPING) ─── */
.hero{
  height:100vh;
  height:100dvh; /* Safely accounts for dynamic sizing parameters on modern devices */
  min-height:560px;
  display:flex;align-items:flex-end;
  padding:0 var(--pad) 80px;
  background-size:cover;background-position:center top;
  position:relative;
}
.hero::before{
  content:''; position:absolute;inset:0;
  background:linear-gradient(to right,rgba(10,10,10,.9) 35%,transparent 70%),
             linear-gradient(to top,rgba(10,10,10,.95) 0%,rgba(10,10,10,.3) 40%,transparent 65%);
}
.hero-content{position:relative;max-width:560px;width:100%;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--red);color:#fff;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:4px;margin-bottom:16px;
}
.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,7vw,88px);
  line-height:.95;letter-spacing:1px;
  margin-bottom:16px;
}
.hero p{
  font-size:15px;line-height:1.6;color:#ccc;
  margin-bottom:28px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:13px;color:var(--muted);}
.hero-meta .rating{color:#f5c518;font-weight:600;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.btn-play{
  background:var(--text);color:#000;
  border:none;padding:12px 28px;border-radius:4px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:8px;
  transition:background .2s,transform .1s;
}
.btn-play:hover{background:#ddd;transform:scale(1.02);}
.btn-info{
  background:rgba(255,255,255,.15);color:#fff;
  border:none;padding:12px 24px;border-radius:4px;
  font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(4px);
  transition:background .2s;
}
.btn-info:hover{background:rgba(255,255,255,.25);}

/* ─── GENRE NAV ─── */
.genre-nav{
  display:flex;gap:8px;padding:16px var(--pad);
  overflow-x:auto;scrollbar-width:none;
}
.genre-nav::-webkit-scrollbar{display:none;}
.genre-pill{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);padding:7px 16px;border-radius:20px;
  font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .2s,color .2s,border-color .2s;
}
.genre-pill:hover,.genre-pill.active{
  background:var(--red);color:#fff;border-color:var(--red);
}

/* ─── ROWS ─── */
.rows-wrap{padding:0 0 60px;}
.row{margin-bottom:8px;padding:0;}
.row-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px var(--pad) 10px;
}
.row-header h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:1px;
}
.see-all{
  font-size:12px;color:var(--red);cursor:pointer;
  text-transform:uppercase;letter-spacing:1px;
  background:none;border:none;font-family:inherit;
}

.row-container{position:relative;}
.row-posters{
  display:flex;gap:10px;
  overflow-x:auto;scroll-behavior:smooth;
  padding:8px var(--pad) 20px;
  scrollbar-width:none;
}
.row-posters::-webkit-scrollbar{display:none;}

/* ─── COMPACT VERTICAL ACCESSIBLE ARROWS ─── */
.arrow{
  position:absolute;top:0;bottom:20px; /* Aligns strictly inside card space bounds */
  width:44px;background:rgba(10,10,10,.75);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;border:none;color:#fff;
  backdrop-filter:blur(4px);transition:background .2s;
}
.arrow:hover{background:rgba(10,10,10,.95);}
.arrow.left{left:0;border-radius:0 4px 4px 0;}
.arrow.right{right:0;border-radius:4px 0 0 4px;}
.arrow svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5;}

/* ─── CARDS ─── */
.poster-landscape{
  width:260px;height:148px;
  border-radius:var(--radius);overflow:hidden;
  cursor:pointer;flex-shrink:0;position:relative;
  transition:transform .25s,box-shadow .25s;
}
.poster-portrait{
  width:148px;height:222px;
  border-radius:var(--radius);overflow:hidden;
  cursor:pointer;flex-shrink:0;position:relative;
  transition:transform .25s,box-shadow .25s;
}
.poster-landscape:hover,.poster-portrait:hover{
  transform:scale(1.05);
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  z-index:5;
}
.poster-landscape img,.poster-portrait img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 50%);
  opacity:0;transition:opacity .25s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:10px;
}
.poster-landscape:hover .card-overlay,
.poster-portrait:hover .card-overlay{opacity:1;}
.card-title{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.card-year{font-size:11px;color:var(--muted);}

.card-mylist{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .2s;cursor:pointer;
}
.poster-landscape:hover .card-mylist,
.poster-portrait:hover .card-mylist{opacity:1;}
.card-mylist:hover{background:var(--red);border-color:var(--red);}
.card-mylist svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;}

/* ─── SKELETON ─── */
.skeleton{
  background:linear-gradient(90deg,var(--surface2) 25%,#2a2a2a 50%,var(--surface2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:var(--radius);flex-shrink:0;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── MODERN FLEX-BASED MODAL (NO FLOATS) ─── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:2000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
  padding:var(--pad);
}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{
  background:#181818;border-radius:12px;
  width:100%;max-width:800px;
  max-height:85vh;max-height:85dvh;
  overflow-y:auto;position:relative;
  transform:scale(.95);transition:transform .3s;
  scrollbar-width:none;
}
.modal-backdrop.open .modal{transform:scale(1);}
.modal::-webkit-scrollbar{display:none;}

.modal-close-container{
  position:absolute;top:16px;right:16px;z-index:10;
}
.modal-close{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.8);border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;
}
.modal-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}

.modal-backdrop-img{
  width:100%;aspect-ratio:16/9;object-fit:cover;
  display:block;background:var(--surface2);
}
.modal-img-overlay{
  position:relative;margin-top:-60px;padding:0 32px 32px;
  background:linear-gradient(to top, #181818 80%, transparent);
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,40px);letter-spacing:1px;
  margin-bottom:8px;
}
.modal-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);margin-bottom:16px;flex-wrap:wrap;}
.modal-meta .rating{color:#f5c518;font-weight:600;color:var(--text);}
.modal-overview{font-size:14px;line-height:1.7;color:#ccc;margin-bottom:24px;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* ─── MY LIST PANEL ─── */
.mylist-panel{
  position:fixed;top:0;right:-420px;height:100%;
  width:400px;background:#181818;z-index:2001;
  transition:right .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;padding:24px;box-shadow:-8px 0 40px rgba(0,0,0,.6);
}
.mylist-panel.open{right:0;}
.mylist-panel h2{
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.mylist-close{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:22px;
}
.mylist-empty{color:var(--muted);font-size:14px;margin-top:32px;text-align:center;}
.mylist-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;
}
.mylist-item img{width:64px;height:40px;border-radius:4px;object-fit:cover;background:var(--surface2);}
.mylist-item-info{flex:1;}
.mylist-item-title{font-size:13px;font-weight:500;}
.mylist-item-type{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.mylist-item-rm{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;
  transition:color .2s;
}
.mylist-item-rm:hover{color:var(--red);}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#222;border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:13px;padding:10px 20px;border-radius:24px;
  z-index:3000;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── UNIFIED RESPONSIBILITY STRATEGY ─── */
@media(max-width:768px){
  #search{width:130px;}
  #search:focus{width:170px;}
  .poster-landscape{width:200px;height:114px;}
  .poster-portrait{width:120px;height:180px;}
  .arrow{display:none;} /* Hides scroll buttons for native finger drag gestures */
  .search-wrap svg{display:none;}
  .mylist-panel{width:100%;right:-100%;}
}
</style>
</head>

    <div class="search-wrap">

      <div id="trial-pill-nav" style="

        <span id="trial-days-label">Trial</span>

        cursor:pointer;transition:all .2s;" 
        onmouseover="this.style.borderColor='rgba(255,255,255,.4)';this.style.color='#fff'"

    <button class="my-list-btn" onclick="openMyList()">

      My List
    </button>

</nav>

<div id="search-results">
  <h2 id="search-heading">Search Results</h2>
  <div class="search-grid" id="search-grid"></div>
</div>

<div class="hero" id="hero">
  <div class="hero-content">
    <div class="hero-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

</div>

<div class="rows-wrap" id="rows-wrap">

      <h2>▶️ Continue Watching</h2>

  <div class="row" id="row-trending">
    <div class="row-header"><h2>🔥 Trending This Week</h2><button class="see-all" onclick="seeAll('','Trending','movie')">See All</button></div>
    <div class="row-container">
      <button class="arrow left" onclick="scrollRow('trending-list',-1)" aria-label="Scroll left">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

    <div class="row-container">
      <button class="arrow left" onclick="scrollRow('top-list',-1)" aria-label="Scroll left">
